---
  - name: Label worker nodes for storage
    shell: kubectl label nodes {{ item }} node-role.kubernetes.io/worker="" --overwrite
    loop: "{{ groups['workers'] }}"
    register: label_result
    changed_when: "'labeled' in label_result.stdout"
    failed_when: label_result.rc != 0 and 'NotFound' not in label_result.stderr

  - name: Copy storage provisioner manifest
    copy:
      src: local-path-storage.yaml
      dest: /tmp/local-path-storage.yaml
      mode: '0644'

  - name: Deploy local-path provisioner
    kubernetes.core.k8s:
      src: /tmp/local-path-storage.yaml
      state: present

  - name: Wait for provisioner to be ready
    shell: kubectl get deployment local-path-provisioner -n local-path-storage -o jsonpath='{.status.availableReplicas}'
    register: provisioner_status
    until: provisioner_status.stdout == "1"
    retries: 30
    delay: 10
    failed_when: false
    ignore_errors: yes

  - name: Check if provisioner is running (fallback)
    shell: kubectl get pods -n local-path-storage -l app=local-path-provisioner --field-selector=status.phase=Running --no-headers | wc -l
    register: running_pods
    when: provisioner_status.stdout != "1"

  - name: Display provisioner status
    debug:
      msg: "Provisioner status: {{ 'Ready' if provisioner_status.stdout == '1' else 'Running pods: ' + running_pods.stdout if running_pods is defined else 'Unknown' }}"

  - name: Verify StorageClass is created
    shell: kubectl get storageclass local-path
    register: sc_check
    changed_when: false

  - name: Display storage info
    debug:
      msg: 
        - "Dynamic storage provisioner deployed"
        - "StorageClass 'local-path' is ready and set as default"
        - "PersistentVolumes will be created automatically in /mnt/k8s-data"
