---
  - name: Create ArgoCD namespace
    kubernetes.core.k8s:
      name: "{{ argocd_namespace }}"
      api_version: v1
      kind: Namespace
      state: present

  - name: Check if ArgoCD Helm release already exists
    ansible.builtin.command: >-
      helm status {{ argocd_helm_release_name }} -n {{ argocd_namespace }}
    register: argocd_helm_status
    changed_when: false
    failed_when: false

  - name: Check if legacy manifest deployment exists
    kubernetes.core.k8s_info:
      api_version: apps/v1
      kind: Deployment
      name: argocd-server
      namespace: "{{ argocd_namespace }}"
    register: argocd_server_deployment
    failed_when: false

  - name: Remove legacy manifest-based ArgoCD resources
    ansible.builtin.command: >-
      kubectl delete -n {{ argocd_namespace }}
      -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
      --ignore-not-found=true
    changed_when: true
    when:
      - argocd_helm_status.rc != 0
      - argocd_server_deployment.resources | length > 0

  - name: Add Argo Helm repository
    kubernetes.core.helm_repository:
      name: "{{ argocd_helm_repo_name }}"
      repo_url: "{{ argocd_helm_repo_url }}"

  - name: Render ArgoCD Helm values file
    ansible.builtin.template:
      src: argocd-values.yaml.j2
      dest: /tmp/argocd-values.yaml
      mode: "0644"

  - name: Install or upgrade ArgoCD via Helm chart
    kubernetes.core.helm:
      name: "{{ argocd_helm_release_name }}"
      chart_ref: "{{ argocd_helm_chart_ref }}"
      chart_version: "{{ argocd_helm_chart_version }}"
      release_namespace: "{{ argocd_namespace }}"
      create_namespace: true
      wait: true
      atomic: true
      update_repo_cache: true
      values_files:
        - /tmp/argocd-values.yaml

  - name: Wait for ArgoCD Application CRD
    ansible.builtin.command: kubectl wait --for=condition=Established crd/applications.argoproj.io --timeout=180s
    changed_when: false

  - name: Remove legacy manual ingress resource if present
    kubernetes.core.k8s:
      api_version: networking.k8s.io/v1
      kind: Ingress
      name: argocd-server-ingress
      namespace: "{{ argocd_namespace }}"
      state: absent

  - name: Deploy app-of-apps ArgoCD application
    kubernetes.core.k8s:
      state: present
      definition: "{{ lookup('template', 'app-of-apps-application.yaml.j2') | from_yaml }}"
    when: argocd_app_of_apps_enabled | bool

  - name: Get ArgoCD initial admin password
    kubernetes.core.k8s_info:
      kind: Secret
      name: argocd-initial-admin-secret
      namespace: "{{ argocd_namespace }}"
    register: argocd_secret
    retries: 10
    delay: 10
    until: argocd_secret.resources | length > 0

  - name: Display ArgoCD admin password
    debug:
      msg: "ArgoCD admin password: {{ argocd_secret.resources[0].data.password | b64decode }}"
    when: argocd_secret.resources | length > 0

  - name: Display ArgoCD access information
    debug:
      msg:
        - "ArgoCD ingress class: {{ argocd_ingress_class_name }}"
        - "ArgoCD is accessible at: {{ argocd_url_scheme }}://{{ (argocd_ingress_hosts | first) | default('set argocd_ingress_hosts') }}"
    when:
      - argocd_ingress_enabled | bool

  - name: Get ArgoCD NodePort
    ansible.builtin.command: >-
      kubectl get svc argocd-server -n {{ argocd_namespace }}
      -o jsonpath={.spec.ports[?(@.port==80)].nodePort}
    register: argocd_http_nodeport
    changed_when: false
    when: argocd_server_service_type == 'NodePort'

  - name: Display ArgoCD NodePort access information
    debug:
      msg:
        - "ArgoCD is accessible at: http://{{ ansible_host }}:{{ argocd_http_nodeport.stdout }}"
    when: argocd_server_service_type == 'NodePort'