---
- name: Install GitLab container dependencies
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Configure Docker to trust GitLab insecure registry
  ansible.builtin.copy:
    content: |
      { "insecure-registries": ["{{ ansible_host }}:{{ gitlab_registry_port }}"] }
    dest: /etc/docker/daemon.json
    mode: "0644"
  register: docker_daemon_config

- name: Restart Docker if registry config changed
  ansible.builtin.service:
    name: docker
    state: restarted
  when: docker_daemon_config.changed

- name: Create GitLab persistent directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ gitlab_compose_dir }}"
    - "{{ gitlab_base_dir }}"
    - "{{ gitlab_base_dir }}/config"
    - "{{ gitlab_base_dir }}/logs"
    - "{{ gitlab_base_dir }}/data"

- name: Render GitLab compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ gitlab_compose_dir }}/docker-compose.yml"
    mode: "0644"

- name: Start or update GitLab container
  ansible.builtin.command: docker compose -f {{ gitlab_compose_dir }}/docker-compose.yml up -d
  register: gitlab_compose_result
  changed_when: >-
    'Creating' in gitlab_compose_result.stdout or
    'Recreating' in gitlab_compose_result.stdout or
    'Starting' in gitlab_compose_result.stdout or
    'Pulling' in gitlab_compose_result.stdout or
    'Created' in gitlab_compose_result.stderr or
    'Recreated' in gitlab_compose_result.stderr or
    'Started' in gitlab_compose_result.stderr or
    'Pulled' in gitlab_compose_result.stderr

- name: Wait for GitLab web UI to become available
  ansible.builtin.uri:
    url: "{{ gitlab_external_url }}/users/sign_in"
    method: GET
    status_code:
      - 200
      - 301
      - 302
    follow_redirects: safe
    validate_certs: false
  register: gitlab_http_check
  retries: "{{ gitlab_startup_retries }}"
  delay: "{{ gitlab_startup_delay }}"
  until: gitlab_http_check.status in [200, 301, 302]

- name: Display GitLab access information
  ansible.builtin.debug:
    msg:
      - "GitLab is accessible at: {{ gitlab_external_url }}"
      - "GitLab SSH clone port: {{ gitlab_ssh_port }}"
      - "GitLab registry: {{ ansible_host }}:{{ gitlab_registry_port }}"
      - "Persistent data directory: {{ gitlab_base_dir }}"

# --- Create API token and project ---

- name: Create GitLab API token via rails console
  ansible.builtin.command: >-
    docker exec {{ gitlab_container_name }} gitlab-rails runner
    "token = PersonalAccessToken.find_by(name: 'ansible');
    token.destroy! if token;
    token = User.find_by_username('root').personal_access_tokens.create!(
      scopes: ['api', 'read_registry', 'write_registry', 'create_runner'],
      name: 'ansible',
      expires_at: 365.days.from_now
    );
    token.set_token('{{ gitlab_api_token }}');
    token.save!;
    puts token.token"
  register: token_result
  changed_when: true

- name: Wait for GitLab API to accept token
  ansible.builtin.uri:
    url: "{{ gitlab_external_url }}/api/v4/version"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ gitlab_api_token }}"
    status_code: 200
  retries: 10
  delay: 5
  register: api_check
  until: api_check.status == 200

- name: Check if retail-store project already exists
  ansible.builtin.uri:
    url: "{{ gitlab_external_url }}/api/v4/projects?search={{ gitlab_project_name }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ gitlab_api_token }}"
    status_code: 200
  register: project_search

- name: Create retail-store project in GitLab
  ansible.builtin.uri:
    url: "{{ gitlab_external_url }}/api/v4/projects"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ gitlab_api_token }}"
    body_format: json
    body:
      name: "{{ gitlab_project_name }}"
      visibility: public
      initialize_with_readme: false
    status_code:
      - 201
  when: project_search.json | selectattr('name', 'equalto', gitlab_project_name) | list | length == 0

# --- Push retail-store code to GitLab ---

- name: Ensure git user config is set
  ansible.builtin.shell: |
    git config user.email "ansible@{{ ansible_host }}" 2>/dev/null || git config --global user.email "ansible@{{ ansible_host }}"
    git config user.name "Ansible" 2>/dev/null || git config --global user.name "Ansible"
  args:
    chdir: "{{ retail_store_local_path }}"
  delegate_to: localhost
  become: false
  changed_when: false

- name: Stage .gitlab-ci.yml if present
  ansible.builtin.shell: |
    cd "{{ retail_store_local_path }}"
    git add .gitlab-ci.yml 2>/dev/null || true
    git diff --cached --quiet || git commit -m "ci: add GitLab CI pipeline for Docker builds"
  delegate_to: localhost
  become: false
  changed_when: false

- name: Push retail-store code to GitLab
  ansible.builtin.shell: |
    cd "{{ retail_store_local_path }}"
    git push "http://root:${GITLAB_TOKEN}@{{ ansible_host }}/root/{{ gitlab_project_name }}.git" HEAD:main --force
  environment:
    GITLAB_TOKEN: "{{ gitlab_api_token }}"
  delegate_to: localhost
  become: false
  changed_when: true
  no_log: true

# --- Deploy and register GitLab Runner ---

- name: Check if GitLab Runner container exists
  ansible.builtin.command: docker inspect gitlab-runner
  register: runner_inspect
  failed_when: false
  changed_when: false

- name: Deploy GitLab Runner container
  ansible.builtin.command: >-
    docker run -d
    --name gitlab-runner
    --restart always
    -v /var/run/docker.sock:/var/run/docker.sock
    -v gitlab-runner-config:/etc/gitlab-runner
    {{ gitlab_runner_image }}
  when: runner_inspect.rc != 0

- name: Check if runner is already registered
  ansible.builtin.command: docker exec gitlab-runner gitlab-runner list
  register: runner_list
  changed_when: false
  failed_when: false

- name: Create runner via GitLab API
  ansible.builtin.uri:
    url: "{{ gitlab_external_url }}/api/v4/user/runners"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ gitlab_api_token }}"
    body_format: json
    body:
      runner_type: instance_type
      description: docker-builder
      tag_list:
        - docker
        - build
    status_code: 201
  register: runner_api_result
  when: "'docker-builder' not in (runner_list.stderr | default(''))"

- name: Register GitLab Runner
  ansible.builtin.command: >-
    docker exec gitlab-runner gitlab-runner register
    --non-interactive
    --url "{{ gitlab_external_url }}"
    --token "{{ runner_api_result.json.token }}"
    --executor docker
    --docker-image "docker:latest"
    --docker-volumes "/var/run/docker.sock:/var/run/docker.sock"
    --description "docker-builder"
  when: runner_api_result is changed

- name: Display setup summary
  ansible.builtin.debug:
    msg:
      - "GitLab: {{ gitlab_external_url }}"
      - "Registry: {{ ansible_host }}:{{ gitlab_registry_port }}"
      - "Project: {{ gitlab_external_url }}/root/{{ gitlab_project_name }}"
      - "Runner: docker-builder (docker executor)"