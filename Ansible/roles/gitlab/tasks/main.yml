---
- name: Install GitLab container dependencies
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Configure Docker to trust GitLab insecure registry
  ansible.builtin.copy:
    content: |
      { "insecure-registries": ["{{ ansible_host }}:{{ gitlab_registry_port }}"] }
    dest: /etc/docker/daemon.json
    mode: "0644"
  register: docker_daemon_config

- name: Restart Docker if registry config changed
  ansible.builtin.service:
    name: docker
    state: restarted
  when: docker_daemon_config.changed

- name: Create GitLab persistent directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ gitlab_compose_dir }}"
    - "{{ gitlab_base_dir }}"
    - "{{ gitlab_base_dir }}/config"
    - "{{ gitlab_base_dir }}/logs"
    - "{{ gitlab_base_dir }}/data"

- name: Render GitLab compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ gitlab_compose_dir }}/docker-compose.yml"
    mode: "0644"

- name: Start or update GitLab container
  ansible.builtin.command: docker compose -f {{ gitlab_compose_dir }}/docker-compose.yml up -d
  register: gitlab_compose_result
  changed_when: >-
    'Creating' in gitlab_compose_result.stdout or
    'Recreating' in gitlab_compose_result.stdout or
    'Starting' in gitlab_compose_result.stdout or
    'Pulling' in gitlab_compose_result.stdout or
    'Created' in gitlab_compose_result.stderr or
    'Recreated' in gitlab_compose_result.stderr or
    'Started' in gitlab_compose_result.stderr or
    'Pulled' in gitlab_compose_result.stderr

- name: Wait for GitLab web UI to become available
  ansible.builtin.uri:
    url: "{{ gitlab_external_url }}/users/sign_in"
    method: GET
    status_code:
      - 200
      - 301
      - 302
    follow_redirects: safe
    validate_certs: false
  register: gitlab_http_check
  retries: "{{ gitlab_startup_retries }}"
  delay: "{{ gitlab_startup_delay }}"
  until: gitlab_http_check.status in [200, 301, 302]

- name: Display GitLab access information
  ansible.builtin.debug:
    msg:
      - "GitLab is accessible at: {{ gitlab_external_url }}"
      - "GitLab SSH clone port: {{ gitlab_ssh_port }}"
      - "GitLab registry: {{ ansible_host }}:{{ gitlab_registry_port }}"
      - "Persistent data directory: {{ gitlab_base_dir }}"

- name: Ensure containerd config_path is set on all nodes
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^\s*config_path = ""'
    line: '      config_path = "/etc/containerd/certs.d"'
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  register: containerd_config_path

- name: Create containerd registry config directory on all nodes
  ansible.builtin.file:
    path: "/etc/containerd/certs.d/{{ ansible_host }}:{{ gitlab_registry_port }}"
    state: directory
    mode: '0755'
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"

- name: Configure containerd to use HTTP for GitLab registry on all nodes
  ansible.builtin.copy:
    content: |
      server = "http://{{ ansible_host }}:{{ gitlab_registry_port }}"

      [host."http://{{ ansible_host }}:{{ gitlab_registry_port }}"]
        capabilities = ["pull", "resolve"]
        skip_verify = true
    dest: "/etc/containerd/certs.d/{{ ansible_host }}:{{ gitlab_registry_port }}/hosts.toml"
    mode: '0644'
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  register: containerd_registry_config

- name: Restart containerd on all nodes
  ansible.builtin.service:
    name: containerd
    state: restarted
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  when: containerd_config_path.changed or containerd_registry_config.changed

# --- Create API token and project ---

- name: Wait for GitLab internals to be fully ready
  ansible.builtin.command: >-
    docker exec {{ gitlab_container_name }} gitlab-rake gitlab:check SANITIZE=true
  register: gitlab_health
  retries: 30
  delay: 20
  until: gitlab_health.rc == 0
  changed_when: false
  failed_when: false

- name: Create GitLab API token via rails console
  ansible.builtin.command: >-
    docker exec {{ gitlab_container_name }} gitlab-rails runner
    "token = PersonalAccessToken.find_by(name: 'ansible');
    token.destroy! if token;
    token = User.find_by_username('root').personal_access_tokens.create!(
      scopes: ['api', 'read_registry', 'write_registry', 'create_runner'],
      name: 'ansible',
      expires_at: 365.days.from_now
    );
    token.set_token('{{ gitlab_api_token }}');
    token.save!;
    puts token.token"
  register: token_result
  changed_when: true
  timeout: 300

- name: Wait for GitLab API to accept token
  ansible.builtin.uri:
    url: "{{ gitlab_external_url }}/api/v4/version"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ gitlab_api_token }}"
    status_code: 200
  retries: 10
  delay: 5
  register: api_check
  until: api_check.status == 200

- name: Create GitLab projects
  ansible.builtin.uri:
    url: "{{ gitlab_external_url }}/api/v4/projects"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ gitlab_api_token }}"
    body_format: json
    body:
      name: "{{ item.name }}"
      visibility: public
      initialize_with_readme: false
    status_code:
      - 201
      - 400
  loop: "{{ gitlab_projects }}"
  loop_control:
    label: "{{ item.name }}"

# --- Push code to GitLab projects ---

- name: Initialize standalone git repos if needed
  ansible.builtin.shell: |
    cd "{{ item.local_path }}"
    if [ -d .git ]; then
      rm -rf .git
    fi
    git init
    git checkout -b main
  delegate_to: localhost
  become: false
  changed_when: false
  loop: "{{ gitlab_projects }}"
  loop_control:
    label: "{{ item.name }}"

- name: Commit code for each project
  ansible.builtin.shell: |
    cd "{{ item.local_path }}"
    git config user.email "ansible@{{ ansible_host }}"
    git config user.name "Ansible"
    git add -A
    git diff --cached --quiet || git commit -m "feat: initial {{ item.name }} upload"
  delegate_to: localhost
  become: false
  changed_when: false
  loop: "{{ gitlab_projects }}"
  loop_control:
    label: "{{ item.name }}"

- name: Unprotect main branch to allow force push
  ansible.builtin.uri:
    url: "{{ gitlab_external_url }}/api/v4/projects/root%2F{{ item.name }}/protected_branches/main"
    method: DELETE
    headers:
      PRIVATE-TOKEN: "{{ gitlab_api_token }}"
    status_code:
      - 204
      - 404
  loop: "{{ gitlab_projects }}"
  loop_control:
    label: "{{ item.name }}"

- name: Push code to GitLab projects
  ansible.builtin.shell: |
    cd "{{ item.local_path }}"
    git push "http://root:${GITLAB_TOKEN}@{{ ansible_host }}/root/{{ item.name }}.git" main --force 2>&1
  environment:
    GITLAB_TOKEN: "{{ gitlab_api_token }}"
  delegate_to: localhost
  become: false
  changed_when: true
  loop: "{{ gitlab_projects }}"
  loop_control:
    label: "{{ item.name }}"

# --- Deploy and register GitLab Runner ---

- name: Check if GitLab Runner container exists
  ansible.builtin.command: docker inspect gitlab-runner
  register: runner_inspect
  failed_when: false
  changed_when: false

- name: Deploy GitLab Runner container
  ansible.builtin.command: >-
    docker run -d
    --name gitlab-runner
    --restart always
    -v /var/run/docker.sock:/var/run/docker.sock
    -v gitlab-runner-config:/etc/gitlab-runner
    {{ gitlab_runner_image }}
  when: runner_inspect.rc != 0

- name: Check if runner is already registered
  ansible.builtin.shell: docker exec gitlab-runner gitlab-runner list 2>&1
  register: runner_list
  changed_when: false
  failed_when: false

- name: Create runner via GitLab API
  ansible.builtin.uri:
    url: "{{ gitlab_external_url }}/api/v4/user/runners"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ gitlab_api_token }}"
    body_format: json
    body:
      runner_type: instance_type
      description: docker-builder
      tag_list:
        - docker
        - build
    status_code: 201
  register: runner_api_result
  when: "'Executor=' not in (runner_list.stdout | default(''))"

- name: Register GitLab Runner
  ansible.builtin.shell: >-
    docker exec gitlab-runner gitlab-runner register
    --non-interactive
    --url "{{ gitlab_external_url }}"
    --token "{{ runner_api_result.json.token }}"
    --executor docker
    --docker-image "docker:latest"
    --docker-volumes "/var/run/docker.sock:/var/run/docker.sock"
    --description "docker-builder"
  when: runner_api_result is changed

- name: Verify runner is online
  ansible.builtin.shell: docker exec gitlab-runner gitlab-runner verify 2>&1
  changed_when: false

- name: Display setup summary
  ansible.builtin.debug:
    msg:
      - "GitLab: {{ gitlab_external_url }}"
      - "Registry: {{ ansible_host }}:{{ gitlab_registry_port }}"
      - "Projects: ansible, argocd, retail-store"
      - "Runner: docker-builder (docker executor)"