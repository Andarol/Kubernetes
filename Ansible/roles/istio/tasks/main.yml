---
- name: Create Istio namespaces
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ item }}"
    state: present
  loop:
    - "{{ istio_system_namespace }}"
    - "{{ istio_ingress_namespace }}"

- name: Ensure secure namespaces exist
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ item }}"
    state: present
  loop: "{{ istio_secure_namespaces }}"

- name: Add Istio Helm repository
  kubernetes.core.helm_repository:
    name: "{{ istio_repo_name }}"
    repo_url: "{{ istio_repo_url }}"

- name: Install Istio base chart
  kubernetes.core.helm:
    name: istio-base
    chart_ref: "{{ istio_base_chart_ref }}"
    release_namespace: "{{ istio_system_namespace }}"
    create_namespace: true
    wait: true
    atomic: true
    update_repo_cache: true

- name: Install Istio control plane
  kubernetes.core.helm:
    name: istiod
    chart_ref: "{{ istio_istiod_chart_ref }}"
    release_namespace: "{{ istio_system_namespace }}"
    create_namespace: true
    wait: true
    atomic: true
    update_repo_cache: true

- name: Install Istio ingress gateway
  kubernetes.core.helm:
    name: istio-ingress
    chart_ref: "{{ istio_gateway_chart_ref }}"
    release_namespace: "{{ istio_ingress_namespace }}"
    create_namespace: true
    wait: true
    atomic: true
    update_repo_cache: true
    values:
      labels:
        istio: ingressgateway
      service:
        type: "{{ istio_ingress_service_type }}"

- name: Enable sidecar injection on secure namespaces
  ansible.builtin.command: >-
    kubectl label namespace {{ item }} istio-injection=enabled --overwrite
  changed_when: true
  loop: "{{ istio_secure_namespaces }}"

- name: Apply strict mTLS policy on secure namespaces
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: security.istio.io/v1
      kind: PeerAuthentication
      metadata:
        name: default
        namespace: "{{ item }}"
      spec:
        mtls:
          mode: STRICT
  loop: "{{ istio_secure_namespaces }}"

- name: Apply ISTIO_MUTUAL destination rule on secure namespaces
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.istio.io/v1
      kind: DestinationRule
      metadata:
        name: default
        namespace: "{{ item }}"
      spec:
        host: "*.{{ item }}.svc.cluster.local"
        trafficPolicy:
          tls:
            mode: ISTIO_MUTUAL
  loop: "{{ istio_secure_namespaces }}"

- name: Create Istio gateway for Argo CD
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.istio.io/v1
      kind: Gateway
      metadata:
        name: argocd-gateway
        namespace: "{{ istio_ingress_namespace }}"
      spec:
        selector:
          istio: ingressgateway
        servers:
          - port:
              number: 80
              name: http
              protocol: HTTP
            hosts: "{{ istio_argocd_hosts }}"
  when: istio_argocd_hosts | length > 0

- name: Create Istio virtual service for Argo CD
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.istio.io/v1
      kind: VirtualService
      metadata:
        name: argocd
        namespace: argocd
      spec:
        hosts: "{{ istio_argocd_hosts }}"
        gateways:
          - "{{ istio_ingress_namespace }}/argocd-gateway"
        http:
          - route:
              - destination:
                  host: argocd-server.argocd.svc.cluster.local
                  port:
                    number: 80
  when: istio_argocd_hosts | length > 0
