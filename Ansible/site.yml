---
- name: Configure Kubernetes Control Plane
  hosts: control_plane
  become: true
  vars_files:
    - inventories/vault.yml
  roles:
    - k8s_cp
    - helm
    - istio

- name: Configure Kubernetes Worker Nodes
  hosts: workers
  become: true
  vars_files:
    - inventories/vault.yml
  roles:
    - k8s_worker

# - name: Configure Storage Provisioner
#   hosts: control_plane
#   become: true
#   vars_files:
#     - inventories/vault.yml
#   roles:
#     - local_storage

- name: Install ArgoCD
  hosts: control_plane
  become: true
  vars_files:
    - inventories/vault.yml
  roles:
    - argocd

- name: Install GitLab on control node
  hosts: control_plane[0]
  become: true
  vars_files:
    - inventories/vault.yml
  roles:
    - gitlab
