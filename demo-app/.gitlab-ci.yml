stages:
  - build
  - update-chart

variables:
  DOCKER_BUILDKIT: "1"
  BUILDX_NO_DEFAULT_ATTESTATIONS: "1"

before_script:
  - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

build-frontend:
  stage: build
  tags:
    - docker
  script:
    - docker build --pull --provenance=false --sbom=false -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA -t $CI_REGISTRY_IMAGE/frontend:latest src/frontend
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/frontend:latest

build-backend:
  stage: build
  tags:
    - docker
  script:
    - docker build --pull --provenance=false --sbom=false -t $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA -t $CI_REGISTRY_IMAGE/backend:latest src/backend
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/backend:latest

update-chart:
  stage: update-chart
  image: alpine:3.19
  tags:
    - docker
  before_script: []
  script:
    - apk add --no-cache git
    - git config user.email "ci@gitlab.local"
    - git config user.name "GitLab CI"
    - git remote set-url origin "http://root:${GITLAB_TOKEN}@${CI_SERVER_HOST}:${CI_SERVER_PORT}/${CI_PROJECT_PATH}.git"

    - |
      sed -i -E 's/^([[:space:]]*tag:[[:space:]]*)".*"([[:space:]]*# frontend)$/\1"'"${CI_COMMIT_SHORT_SHA}"'"\2/' chart/values.yaml
      sed -i -E 's/^([[:space:]]*tag:[[:space:]]*)".*"([[:space:]]*# backend)$/\1"'"${CI_COMMIT_SHORT_SHA}"'"\2/' chart/values.yaml

    - git add chart/values.yaml
    - git diff --cached --quiet && echo "No changes to commit" && exit 0
    - 'git commit -m "ci: update image tags to ${CI_COMMIT_SHORT_SHA} [skip ci]"'
    - git push origin HEAD:${CI_COMMIT_REF_NAME}
  only:
    - main