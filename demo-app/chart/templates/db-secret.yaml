apiVersion: v1
kind: Secret
metadata:
  name: demo-app-db
  labels:
    app: demo-app
    component: db
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.db.env.POSTGRES_DB | quote }}
  POSTGRES_USER: {{ .Values.db.env.POSTGRES_USER | quote }}
  POSTGRES_PASSWORD: {{ .Values.db.env.POSTGRES_PASSWORD | quote }}
