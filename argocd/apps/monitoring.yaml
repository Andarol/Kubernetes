apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://victoriametrics.github.io/helm-charts/
    chart: victoria-metrics-k8s-stack
    targetRevision: "*"
    helm:
      values: |
        fullnameOverride: monitoring

        # Keep single-node mode for homelab/private clusters.
        vmcluster:
          enabled: false
        vmsingle:
          enabled: true
          spec:
            retentionPeriod: "14d"

        alertmanager:
          enabled: false

        grafana:
          enabled: true
          service:
            type: NodePort

        kubeStateMetrics:
          enabled: true
        nodeExporter:
          enabled: true
        kubelet:
          enabled: true

        defaultRules:
          create: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
